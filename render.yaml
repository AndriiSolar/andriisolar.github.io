services:
  - type: web
    name: zvg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # Manuell in Render Dashboard setzen
      - key: DB_NAME
        value: zvg_db
      - key: RESEND_API_KEY
        sync: false  # Optional: Manuell setzen für E-Mail-Notifications
      - key: SENDER_EMAIL
        sync: false  # Optional: z.B. onboarding@resend.dev
      - key: CORS_ORIGINS
        value: https://andriisolar.github.io
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/
    autoDeploy: true
